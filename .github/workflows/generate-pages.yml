name: Generate pages.json

permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Generate pages.json
        run: |
          echo "[" > pages.json
          find . -type f -name "*.md" | grep -v "pages.json" | grep -v ".github" | while read f; do
            title=$(basename "$f" .md)
            title=$(echo "$title" | sed 's/"/\\"/g')
            echo "{\"title\": \"$title\", \"path\": \"$f\"}," >> pages.json
          done
          sed -i '$ s/,$//' pages.json
          echo "]" >> pages.json

      - name: Commit pages.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add pages.json
          git diff-index --quiet HEAD || git commit -m "Update pages.json"
          git push
