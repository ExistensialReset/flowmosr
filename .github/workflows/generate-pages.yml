name: Generate pages.json

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Generate pages.json
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const folderOrder = [
            "00_core","01_principles","02_documents","03_governance",
            "04_simulations","05_facilitators","06_justice","07_technology",
            "08_environmental","09_economics","10_svenska"
          ];

          const pages = [];

          folderOrder.forEach(folder => {
            if (!fs.existsSync(folder)) return;
            const files = fs.readdirSync(folder)
              .filter(f => f.endsWith('.md'))
              .sort();
            files.forEach(f => {
              pages.push({
                title: f.replace(/\.md$/, ''),
                path: `${folder}/${f}`
              });
            });
          });

          fs.writeFileSync('pages.json', JSON.stringify(pages, null, 2));
          EOF

      - name: Commit and push pages.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pages.json
          git commit -m "Update pages.json [skip ci]" || echo "No changes"
          git push