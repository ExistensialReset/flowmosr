name: Generate pages.json

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Node.js 24
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      - name: Generate pages.json
        run: |
          echo "Running pages.json generator..."
          node << 'EOF'
          const fs = require('fs');
          const path = require('path');

          const folderOrder = [
            "00_core","01_principles","02_documents","03_governance",
            "04_simulations","05_facilitators","06_justice","07_technology",
            "08_environmental","09_economics","10_svenska"
          ];

          let pages = [];

          folderOrder.forEach(folder => {
            if (!fs.existsSync(folder)) return;
            const files = fs.readdirSync(folder)
              .filter(f => f.toLowerCase().endsWith('.md'))
              .sort();
            files.forEach(f => {
              pages.push({
                title: f.replace(/\.md$/i, ''),
                path: folder + "/" + f
              });
            });
          });

          fs.writeFileSync('pages.json', JSON.stringify(pages, null, 2));
          console.log(`Generated pages.json with ${pages.length} entries`);
          EOF

      - name: Upload pages.json as artifact (for debug)
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: pages-json
          path: pages.json