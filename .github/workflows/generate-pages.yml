name: Generate pages.json

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Generate pages.json
        run: |
          node .github/scripts/generate-pages.js > pages.json

      - name: Git Config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit pages.json
        run: |
          git add pages.json
          git diff-index --quiet HEAD || git commit -m "Update pages.json [skip ci]"

      - name: Push
        run: |
          git push