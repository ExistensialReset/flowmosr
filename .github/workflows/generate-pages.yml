name: Generate pages.json

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Show directory tree
        run: |
          echo "=== Root structure ==="
          ls -R .

      - name: Run generator with debug
        run: |
          echo "📌 Kör Pages‑generator"
          node .github/scripts/generate-pages.js || {
            echo "❌ ERROR: Generatorn misslyckades!"
            exit 1
          }

      - name: Show generated pages.json
        run: |
          echo "📌 pages.json innehåll:"
          cat pages.json

      - name: Git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit pages.json
        run: |
          git add pages.json
          git diff-index --quiet HEAD || git commit -m "Update pages.json [skip ci]"

      - name: Push
        run: git push