<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flow MOSR</title>
<style>
  body { display: flex; margin: 0; font-family: sans-serif; height: 100vh; }
  #sidebar { width: 280px; background: #1f1f1f; color: #fff; overflow-y: auto; padding: 1em; }
  #sidebar h2 { font-size: 1.1em; margin-top: 1em; }
  #sidebar ul { list-style: none; padding-left: 0; }
  #sidebar li { margin: 0.3em 0; cursor: pointer; }
  #sidebar li:hover { text-decoration: underline; }
  #content { flex: 1; padding: 2em; overflow-y: auto; }
  pre { background: #eee; padding: 0.5em; overflow-x: auto; }
  code { background: #eee; padding: 2px 4px; }
  a { color: #3498db; text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div id="sidebar"></div>
<div id="content">Laddar...</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
// --- Din JSON-meny här ---
const menu = [
  {"title":"00_core","path":"00_core/README.md"},
  {"title":"01_principles","path":"01_principles/README.md"},
  {"title":"02_documents","path":"02_documents/README.md"},
  {"title":"03_governance","path":"03_governance/README.md"},
  {"title":"04_simulations","path":"04_simulations/README.md"},
  {"title":"05_facilitators","path":"05_facilitators/README.md"},
  {"title":"06_justice","path":"06_justice/README.md"},
  {"title":"07_technology","path":"07_technology/README.md"},
  {"title":"08_environmental","path":"08_environmental/README.md"},
  {"title":"09_economics","path":"09_economics/README.md"},
  {"title":"10_svenska","path":"10_svenska/README.md"}
];

// --- Skapar sidebar ---
const sidebar = document.getElementById('sidebar');
menu.forEach(item => {
  const li = document.createElement('li');
  li.textContent = item.title;
  li.onclick = () => loadFile(item.path);
  sidebar.appendChild(li);
});

// --- Funktion för att ladda markdown och rendera ---
function loadFile(path) {
  fetch(path)
    .then(resp => {
      if (!resp.ok) throw new Error("Kan inte läsa filen");
      return resp.text();
    })
    .then(text => {
      document.getElementById('content').innerHTML = marked.parse(text);
    })
    .catch(err => {
      document.getElementById('content').innerHTML = `<p style="color:red;">Fel vid laddning av fil: ${err}</p>`;
    });
}

// --- Ladda root README.md som startsida ---
loadFile('README.md');
</script>

</body>
</html>
