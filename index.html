    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background-color: #1b0a3b; /* content bakgrund */
      color: #ffb700; /* textfärg */
    }

    #container {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar */
    #sidebar {
      width: 300px;
      background-color: #120836; /* djup mörkblå/lila */
      color: #ffb700;
      overflow-y: auto;
      padding: 1rem;
    }

    #sidebar h2 {
      margin-top: 0;
      font-size: 1.2rem;
      border-bottom: 1px solid #ffb700;
      padding-bottom: 0.5rem;
    }

    #sidebar ul {
      list-style-type: none;
      padding-left: 0;
    }

    #sidebar li {
      margin: 0.3rem 0;
    }

    #sidebar a {
      color: #ffb700;
      text-decoration: none;
      display: block;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
    }

    #sidebar a:hover {
      background-color: #2b0f5e; /* hover */
    }

    #sidebar a.active {
      background-color: #ffa500; 
      font-weight: bold;
      color: #1b0a3b;
    }

    /* Content area */
    #content {
      flex: 1;
      padding: 2rem;
      overflow-y: auto;
      background-color: #1b0a3b;
      color: #ffb700;
    }

    /* Markdown styling */
    h1, h2, h3, h4, h5, h6 {
      color: #ffb700;
    }

    a {
      color: #ffb700;
    }

    pre, code {
      background-color: #2b0f5e;
      color: #ffb700;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      overflow-x: auto;
    }
  </style>
