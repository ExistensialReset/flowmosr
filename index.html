<script>
fetch('pages.json')
  .then(res => res.json())
  .then(data => {
    render(data);
    loadPage('README.md'); // 🔥 start-sida
  })
  .catch(err => {
    document.getElementById('content').innerText = "Fel loading JSON: " + err;
  });

function render(items) {
  const sidebar = document.getElementById('sidebar');

  items.forEach(item => {
    const div = document.createElement('div');
    div.textContent = item.title;
    div.className = "item";

    if (item.path) {
      div.onclick = () => loadPage(item.path);
    }

    sidebar.appendChild(div);

    if (item.children) {
      render(item.children);
    }
  });
}

function loadPage(path) {
  fetch(encodeURI(path))
    .then(res => {
      if (!res.ok) throw new Error("Hittar inte filen");
      return res.text();
    })
    .then(text => {
      document.getElementById('content').innerText = text;
    })
    .catch(err => {
      document.getElementById('content').innerText = "Fel: " + err;
    });
}
</script>
