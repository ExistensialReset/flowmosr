<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flow MOSR</title>

<!-- CSS -->
<style>
  body {
    margin: 0;
    font-family: "Inter", sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
    background-color: #1b0a3b; /* djup lila/mörkblå */
    color: #ffb700; /* lysande gul/guld/orange */
  }

  /* Sidebar */
  #sidebar {
    width: 300px;
    background-color: #2e0d55; /* mörk lila */
    color: #ffb700;
    overflow-y: auto;
    padding: 1rem;
  }

  #sidebar h2 {
    font-size: 1.2rem;
    margin-top: 1rem;
    cursor: pointer;
  }

  #sidebar a {
    color: #ffb700;
    text-decoration: none;
    display: block;
    padding: 0.2rem 0.5rem;
    border-radius: 4px;
  }

  #sidebar a:hover {
    background-color: #4b1a7d; 
  }

  #sidebar a.active {
    background-color: #ffa500; 
    font-weight: bold;
    color: #1b0a3b; 
  }

  details > summary {
    cursor: pointer;
    list-style: none;
    padding: 0.2rem 0.5rem;
    border-radius: 4px;
  }

  details > summary:hover {
    background-color: #4b1a7d;
  }

  details[open] > summary {
    font-weight: bold;
  }

  /* Content */
  #content {
    flex: 1;
    overflow-y: auto;
    padding: 2rem;
    background-color: #1b0a3b; /* samma djupa bakgrund */
    color: #ffb700; /* lysande text */
  }

  /* Markdown styling */
  h1, h2, h3, h4, h5 {
    border-bottom: 1px solid #4b1a7d;
    padding-bottom: 0.3rem;
    color: #ffb700;
  }

  p, li, blockquote {
    color: #ffb700;
  }

  a.markdown-link {
    color: #ffa500;
    text-decoration: none;
  }

  a.markdown-link:hover {
    text-decoration: underline;
  }

  pre, code {
    background-color: #2e0d55; /* matchar sidebar/mörk lila */
    color: #ffb700; /* lysande text även i kod */
    padding: 0.5rem;
    border-radius: 6px;
    overflow-x: auto;
  }

  blockquote {
    border-left: 4px solid #ffa500;
    padding-left: 1rem;
    color: #ffb700;
  }

  table {
    border-collapse: collapse;
    width: 100%;
    margin-bottom: 1rem;
  }

  th, td {
    border: 1px solid #4b1a7d;
    padding: 0.5rem;
    color: #ffb700;
  }

  th {
    background-color: #330d66;
  }
</style>

<!-- Prism.js for syntax highlighting -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.30.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.30.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.30.0/components/prism-markdown.min.js"></script>

<!-- Marked.js for Markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<div id="sidebar"></div>
<div id="content">Laddar...</div>

<script>
  const files = [
    {"title":"00_core","path":"00_core/README.md","children":[
      {"title":"00_FLOW_CORE_ENTRY","path":"00_core/00_FLOW_CORE_ENTRY.md"},
      {"title":"01_FLOW_CORE_STRUCTURE","path":"00_core/01_FLOW_CORE_STRUCTURE.md"},
      {"title":"02_FLOW_EXPLANATION_LAYER","path":"00_core/02_FLOW_EXPLANATION_LAYER.md"},
      {"title":"03_AXIOMS","path":"00_core/03_AXIOMS.md"},
      {"title":"04_FLOW_CORE_INVARIANTS_EXTENDED","path":"00_core/04_FLOW_CORE_INVARIANTS_EXTENDED.md"},
      {"title":"05_STRUCTURAL_INVARIANTS","path":"00_core/05_STRUCTURAL_INVARIANTS.md"}
    ]}
    // … fortsätt med 01_principles → 10_svenska
  ];

  const sidebar = document.getElementById('sidebar');
  const content = document.getElementById('content');

  function buildSidebar(files, parent) {
    files.forEach(file => {
      if(file.children) {
        const details = document.createElement('details');
        const summary = document.createElement('summary');
        summary.textContent = file.title;
        details.appendChild(summary);
        buildSidebar(file.children, details);
        parent.appendChild(details);
      } else {
        const link = document.createElement('a');
        link.href = "#";
        link.textContent = file.title;
        link.dataset.path = file.path;
        link.addEventListener('click', async (e) => {
          e.preventDefault();
          loadMarkdown(file.path);
          setActive(link);
        });
        parent.appendChild(link);
      }
    });
  }

  function setActive(activeLink) {
    document.querySelectorAll('#sidebar a').forEach(a => a.classList.remove('active'));
    activeLink.classList.add('active');
  }

  async function loadMarkdown(path) {
    try {
      const res = await fetch(path);
      const text = await res.text();
      content.innerHTML = marked.parse(text);
      Prism.highlightAll();
    } catch(e) {
      content.innerHTML = `<p style="color:red;">Kunde inte ladda fil: ${path}</p>`;
    }
  }

  buildSidebar(files, sidebar);
  loadMarkdown('README.md'); // Root README som startsida
</script>

</body>
</html>
