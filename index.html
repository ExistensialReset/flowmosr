<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>FlowMOSR</title>
  <style>
    body {
      display: flex;
      margin: 0;
      font-family: Arial;
    }
    #sidebar {
      width: 300px;
      height: 100vh;
      overflow-y: auto;
      background: #111;
      color: white;
      padding: 10px;
    }
    #content {
      flex: 1;
      padding: 20px;
      white-space: pre-wrap;
    }
    .item {
      cursor: pointer;
      margin-left: 10px;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>

<div id="sidebar"></div>
<div id="content">Laddar...</div>

<script>
const sidebar = document.getElementById('sidebar');
const content = document.getElementById('content');

// 🔥 Test att sidan lever
content.innerText = "Startar...";

// 🔥 Ladda JSON
fetch('pages.json')
  .then(res => res.json())
  .then(data => {
    content.innerText = "Start OK";

    // 🔥 Render sidebar
    data.forEach(item => createItem(item));

    // 🔥 Start page
    loadPage('README.md');
  })
  .catch(err => {
    content.innerText = "JSON FEL: " + err;
  });

function createItem(item) {
  const div = document.createElement('div');
  div.textContent = item.title;
  div.className = "item";

  if (item.path) {
    div.onclick = () => loadPage(item.path);
  }

  sidebar.appendChild(div);

  if (item.children) {
    item.children.forEach(child => createItem(child));
  }
}

function loadPage(path) {
  content.innerText = "Laddar " + path + "...";

  fetch(encodeURI(path))
    .then(res => res.text())
    .then(text => {
      content.innerText = text;
    })
    .catch(err => {
      content.innerText = "LOAD FEL: " + err;
    });
}
</script>

</body>
</html>
