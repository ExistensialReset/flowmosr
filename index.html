<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>FlowMOSR</title>
</head>
<body>

<h1>FlowMOSR Debug</h1>

<div id="output">Laddar...</div>

<script>
fetch('pages.json')
  .then(response => {
    if (!response.ok) {
      throw new Error("Kunde inte ladda pages.json");
    }
    return response.json();
  })
  .then(data => {
    document.getElementById('output').innerHTML =
      "<pre>" + JSON.stringify(data, null, 2) + "</pre>";
  })
  .catch(error => {
    document.getElementById('output').innerHTML =
      "<h2>FEL:</h2><pre>" + error + "</pre>";
  });
</script>

</body>
</html>
