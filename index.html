<script>
fetch('pages.json')
  .then(res => res.json())
  .then(data => {
    const sidebar = document.getElementById('sidebar');

    // 🔥 START-knapp
    const start = document.createElement('div');
    start.textContent = "START";
    start.className = "item";
    start.onclick = () => loadPage('README.md');
    sidebar.appendChild(start);

    // 🔥 Rendera resten
    render(data, sidebar);

    // 🔥 Ladda root README direkt
    loadPage('README.md');
  });

function render(items, container) {
  items.forEach(item => {
    const div = document.createElement('div');
    div.textContent = item.title;
    div.className = "item";

    if (item.path) {
      div.onclick = () => loadPage(item.path);
    }

    container.appendChild(div);

    if (item.children) {
      render(item.children, container);
    }
  });
}

function loadPage(path) {
  fetch(encodeURI(path)) // 🔥 fix för åäö
    .then(res => res.text())
    .then(text => {
      document.getElementById('content').innerText = text;
    })
    .catch(err => {
      document.getElementById('content').innerText = "Fel: " + err;
    });
}
</script>
